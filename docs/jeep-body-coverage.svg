<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 900" width="1120" height="900">
  <title>Jeep body side coverage — after full-length shell + skirt fix</title>
  <rect width="1120" height="900" fill="#10141a"/>
  <text x="560" y="28" text-anchor="middle" fill="#f0f0ee" font-family="Consolas, ui-monospace, monospace" font-size="16" font-weight="700">Jeep body side — FIXED full length + bottom skirt</text>
  <text x="560" y="48" text-anchor="middle" fill="#8b939e" font-family="Consolas, ui-monospace, monospace" font-size="11">Matches JeepMesh: outer shell Z length 2.50 · Y rocker→belt · interior cavity still 1.85</text>

  <g transform="translate(40,70)">
    <rect x="0" y="0" width="1040" height="420" rx="6" fill="#1a1f28" stroke="#2a3340"/>
    <text x="16" y="22" fill="#7ec8ff" font-family="Consolas, ui-monospace, monospace" font-size="13" font-weight="700">1) LEFT SIDE (current after fix)</text>

    <g transform="translate(500,320) scale(90,-90)">
      <line x1="-1.7" y1="0" x2="1.55" y2="0" stroke="#333" stroke-width="0.02"/>

      <!-- full length outer shell Z[-1.30,1.20] Y[-0.28,0.70] -->
      <rect x="-1.30" y="-0.28" width="2.50" height="0.98" fill="#d0d4dc" opacity="0.75" stroke="#7ec8ff" stroke-width="0.025"/>
      <!-- side skirt darker lower band -->
      <rect x="-1.30" y="-0.29" width="2.50" height="0.22" fill="#2a2a30" opacity="0.85" stroke="#111" stroke-width="0.012"/>
      <!-- sill accent -->
      <rect x="-1.30" y="0.00" width="2.50" height="0.12" fill="#6dce9a" opacity="0.5" stroke="#3a8" stroke-width="0.01"/>

      <!-- tub stubs (still present, under/inside shell) -->
      <rect x="-1.30" y="-0.21" width="0.25" height="0.667" fill="#e8e8e4" opacity="0.35" stroke="#999" stroke-width="0.01"/>
      <rect x="0.80" y="-0.21" width="0.40" height="0.667" fill="#e8e8e4" opacity="0.35" stroke="#999" stroke-width="0.01"/>

      <!-- doors -->
      <rect x="-0.21" y="0.078" width="0.78" height="0.621" fill="none" stroke="#6af" stroke-width="0.02"/>
      <rect x="-0.97" y="0.078" width="0.78" height="0.621" fill="none" stroke="#6af" stroke-width="0.02"/>

      <!-- glass -->
      <rect x="-1.15" y="0.70" width="1.70" height="0.66" fill="#284050" opacity="0.3" stroke="#4a8" stroke-width="0.015" stroke-dasharray="0.04 0.03"/>
      <line x1="-1.25" y1="0.70" x2="0.55" y2="0.70" stroke="#7ec8ff" stroke-width="0.015"/>

      <!-- rocker -->
      <rect x="-1.3" y="-0.39" width="2.6" height="0.10" fill="#111" opacity="0.95"/>

      <!-- length dim -->
      <line x1="-1.30" y1="-0.55" x2="1.20" y2="-0.55" stroke="#7dcea0" stroke-width="0.025"/>
      <line x1="-1.30" y1="-0.50" x2="-1.30" y2="-0.60" stroke="#7dcea0" stroke-width="0.02"/>
      <line x1="1.20" y1="-0.50" x2="1.20" y2="-0.60" stroke="#7dcea0" stroke-width="0.02"/>
    </g>

    <text x="500" y="385" text-anchor="middle" fill="#7dcea0" font-family="Consolas, ui-monospace, monospace" font-size="13" font-weight="700">outer shell Z length = 2.50 m  (restored; was 1.85)</text>
    <text x="500" y="405" text-anchor="middle" fill="#ccc" font-family="Consolas, ui-monospace, monospace" font-size="11">shell Y [−0.28, +0.70] rocker→belt · skirt Y≈[−0.29, −0.07] · sill Y≈[0.00, 0.12]</text>
    <text x="20" y="400" fill="#6af" font-family="Consolas, ui-monospace, monospace" font-size="10">blue = door skins (detail)</text>
    <text x="20" y="416" fill="#aaa" font-family="Consolas, ui-monospace, monospace" font-size="10">interior liners still cabin Z 1.85 only</text>
  </g>

  <g transform="translate(40,510)">
    <rect x="0" y="0" width="510" height="360" rx="6" fill="#1a1f28" stroke="#2a3340"/>
    <text x="16" y="24" fill="#7ec8ff" font-family="Consolas, ui-monospace, monospace" font-size="13" font-weight="700">2) Z length</text>
    <text x="16" y="56" fill="#ff6666" font-family="Consolas, ui-monospace, monospace" font-size="11">BEFORE shell Z = 1.85 (−0.65 vs old tub)</text>
    <text x="16" y="78" fill="#7dcea0" font-family="Consolas, ui-monospace, monospace" font-size="11" font-weight="700">NOW    shell Z = 2.50  Cz=−0.05</text>
    <text x="16" y="100" fill="#ddd" font-family="Consolas, ui-monospace, monospace" font-size="11">same as old solid tub [−1.30, +1.20]</text>
    <text x="16" y="130" fill="#7ec8ff" font-family="Consolas, ui-monospace, monospace" font-size="12" font-weight="700">Interior (unchanged)</text>
    <text x="16" y="150" fill="#aaa" font-family="Consolas, ui-monospace, monospace" font-size="11">liners / floor / seats Z free = 1.85</text>
    <text x="16" y="168" fill="#aaa" font-family="Consolas, ui-monospace, monospace" font-size="11">cabin Z [−1.05, +0.80]</text>
    <text x="16" y="200" fill="#e8c547" font-family="Consolas, ui-monospace, monospace" font-size="12" font-weight="700">Pieces</text>
    <text x="16" y="220" fill="#ddd" font-family="Consolas, ui-monospace, monospace" font-size="11">cabin-shell-L/R  (0.06, ~0.98, 2.50)</text>
    <text x="16" y="238" fill="#ddd" font-family="Consolas, ui-monospace, monospace" font-size="11">cabin-sill-L/R   (~0.075, 0.12, 2.50)</text>
    <text x="16" y="256" fill="#ddd" font-family="Consolas, ui-monospace, monospace" font-size="11">side-skirt-L/R   (~0.08, 0.22, 2.50)</text>
    <text x="16" y="274" fill="#ddd" font-family="Consolas, ui-monospace, monospace" font-size="11">tub-belly        (bodyW, 0.06, 2.50)</text>
    <text x="16" y="300" fill="#8b939e" font-family="Consolas, ui-monospace, monospace" font-size="10">rear-cheek removed (full shell covers rear)</text>
    <text x="16" y="320" fill="#8b939e" font-family="Consolas, ui-monospace, monospace" font-size="10">tub-front/rear stubs remain under shell</text>
    <text x="16" y="340" fill="#8b939e" font-family="Consolas, ui-monospace, monospace" font-size="10">wheel flares still define arch cut look</text>
  </g>

  <g transform="translate(570,510)">
    <rect x="0" y="0" width="510" height="360" rx="6" fill="#1a1f28" stroke="#2a3340"/>
    <text x="16" y="24" fill="#7ec8ff" font-family="Consolas, ui-monospace, monospace" font-size="13" font-weight="700">3) BOTTOM Y stack (side)</text>
    <text x="16" y="56" fill="#ddd" font-family="Consolas, ui-monospace, monospace" font-size="11">rocker        Y [−0.39, −0.29]</text>
    <text x="16" y="76" fill="#7dcea0" font-family="Consolas, ui-monospace, monospace" font-size="11">side-skirt    Y [−0.29, −0.07]  CLOSED</text>
    <text x="16" y="96" fill="#7dcea0" font-family="Consolas, ui-monospace, monospace" font-size="11">shell bottom  Y −0.28 (overlaps skirt)</text>
    <text x="16" y="116" fill="#7dcea0" font-family="Consolas, ui-monospace, monospace" font-size="11">sill          Y [0.00, 0.12]</text>
    <text x="16" y="136" fill="#ddd" font-family="Consolas, ui-monospace, monospace" font-size="11">shell top     Y belt ≈ 0.70</text>
    <text x="16" y="170" fill="#7dcea0" font-family="Consolas, ui-monospace, monospace" font-size="12" font-weight="700">STATUS</text>
    <text x="16" y="194" fill="#ccc" font-family="Consolas, ui-monospace, monospace" font-size="11">✓ side length restored (not short)</text>
    <text x="16" y="214" fill="#ccc" font-family="Consolas, ui-monospace, monospace" font-size="11">✓ rocker→door bottom filled</text>
    <text x="16" y="234" fill="#ccc" font-family="Consolas, ui-monospace, monospace" font-size="11">✓ cabin hollow + seats unchanged</text>
    <text x="16" y="270" fill="#e8c547" font-family="Consolas, ui-monospace, monospace" font-size="11">Reload game to see mesh</text>
  </g>
</svg>
